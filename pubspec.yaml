name: prova
description: AI-powered fashion try-on app for Turkey.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.7

  # Image picking & handling
  image_picker: ^1.1.2
  image_cropper: ^7.1.0
  cached_network_image: ^3.3.1
  flutter_image_compress: ^2.3.0

  # UI utilities
  shimmer: ^3.0.0
  gap: ^3.0.1
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.2.0

  # Local storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # HTTP
  dio: ^5.6.0

  # Utils
  uuid: ^4.4.2
  intl: ^0.19.0
  path: ^1.9.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Icons (premium line icons)
  icons_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
