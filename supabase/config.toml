# Prova Supabase Configuration
# Reference: https://supabase.com/docs/guides/cli/config

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323
api_url = "http://localhost"

[ingest]
port = 54324

[storage]
file_size_limit = "10MiB"  # user photos max 10MB

[auth]
site_url = "com.prova.app://login-callback"
additional_redirect_urls = [
  "http://localhost:3000"
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # disable for MVP, enable in production

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"

[functions.trigger-tryon]
verify_jwt = true  # require auth

[analytics]
enabled = false
